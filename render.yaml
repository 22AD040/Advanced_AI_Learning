services:
  - type: web
    name: smart-academic-assistant-api
    runtime: python
    repo: https://github.com/yourusername/your-repo-name
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fast_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0